<!DOCTYPE html>
<html class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JunQi Desktop</title>
    <link rel="icon" href="./assets/icon.png" />
  </head>
  <body class="bg-[#0c1015] text-aegis-text font-sans antialiased">
    <div id="app-root">
      <!-- Instant loading indicator — shown before React mounts -->
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:system-ui,sans-serif;">
        <div style="width:32px;height:32px;border:2px solid rgba(14,165,233,0.3);border-top-color:#0ea5e9;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <span style="color:rgba(255,255,255,0.4);font-size:13px;">JunQi Desktop</span>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        body { margin: 0; background: #0c1015; }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
