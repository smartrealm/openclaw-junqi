# ═══════════════════════════════════════════════════════════
# JunQi Desktop — CI
#
# Runs on push to main/daxia and PRs targeting either integration branch. Five jobs:
#   1. rust        — cargo check + cargo test --lib (catches backend regressions)
#   2. frontend    — pnpm install + actionlint + lint (catches type / style regressions)
#   3. tests       — Desktop + collaboration plugin tests
#   4. build       — Vite production build (catches bundler / asset regressions)
#   5. windows     — native MSVC compile + Rust tests (catches Windows-only regressions)
#
# Linux jobs validate the shared code paths; Windows packaging belongs to the
# signed tag workflow so a release does not build the same NSIS installer twice.
# Direct daxia pushes skip the costly native Windows job; main and pull-request
# validation still run it before a tagged release may proceed.
# The single required check is the `ci` summary at the bottom.
#
# Cache strategy: pnpm via setup-node cache, cargo via Swatinemo cache with
# a Cargo.lock key (so cache invalidates when deps change).
# ═══════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, daxia]
  pull_request:
    branches: [main, daxia]

# Cancel in-progress runs for the same branch on a new push — saves CI minutes
# when a developer pushes rapid follow-up commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  NODE_VERSION: "22.23.1"

jobs:
  rust:
    name: Rust (check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # pinned 1.96.0
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build dependencies
        # Tauri on Linux needs libwebkit2gtk + librsvg2 + others.
        # See https://v2.tauri.app/start/prerequisites/#linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Fetch locked Rust dependencies
        run: node scripts/fetch-cargo-dependencies.mjs --target x86_64-unknown-linux-gnu

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo clippy --all-targets

      - name: cargo check
        working-directory: src-tauri
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo check --all-targets

      - name: cargo test (lib only, no GUI)
        working-directory: src-tauri
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo test --lib --no-fail-fast

  frontend:
    name: Frontend (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: GitHub Actions lint
        run: >-
          docker run --rm --pull always
          --mount type=bind,src="$GITHUB_WORKSPACE",dst=/repo,readonly
          --workdir /repo
          rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667

      - name: Frontend lint
        # `lint` is the repository's maintained frontend quality gate: it
        # enforces architectural boundaries and a no-emit TypeScript check.
        run: pnpm lint

  tests:
    name: Tests (Desktop + collaboration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Desktop and boundary tests
        run: pnpm test

      - name: Collaboration plugin tests
        run: pnpm collab:test

  build:
    name: Frontend (vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vite production build
        run: pnpm build

  windows:
    name: Windows (compile + test)
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # pinned 1.96.0
        with:
          toolchain: 1.96.0
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch locked Rust dependencies
        run: node scripts/fetch-cargo-dependencies.mjs --target x86_64-pc-windows-msvc

      - name: Compile all native targets
        working-directory: src-tauri
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo check --all-targets --target x86_64-pc-windows-msvc

      - name: Run native Windows Rust tests
        working-directory: src-tauri
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo test --lib --target x86_64-pc-windows-msvc --no-fail-fast

  ci:
    name: ✅ CI Summary
    needs: [rust, frontend, tests, build, windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.rust.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.tests.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             { [ "${{ needs.windows.result }}" != "success" ] && [ "${{ needs.windows.result }}" != "skipped" ]; }; then
            echo "::error::One or more jobs failed:"
            echo "  rust:      ${{ needs.rust.result }}"
            echo "  frontend:  ${{ needs.frontend.result }}"
            echo "  tests:     ${{ needs.tests.result }}"
            echo "  build:     ${{ needs.build.result }}"
            echo "  windows:   ${{ needs.windows.result }}"
            exit 1
          fi
          echo "✅ All jobs passed"
