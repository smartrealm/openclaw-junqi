# ═══════════════════════════════════════════════════════════
# JunQi Desktop — Release Build (macOS + Windows)
#
# Builds the Tauri desktop app on macOS and Windows in parallel and
# uploads installers as workflow artifacts. A version tag additionally
# creates a public GitHub Release with those installers attached. Designed
# to be triggered by either:
#   - push to daxia (fresh, short-lived binaries in the Actions tab)
#   - workflow_dispatch (manual ad-hoc builds)
#   - tag push v* (a permanent GitHub Release)
#
# Why all desktop platforms in one workflow rather than separate files:
#   - one place to read the matrix, cache strategy, artifact naming
#   - the '✅ Release Summary' job at the end gives a single status
#     banner for the whole release in the Actions tab
#
# Why use tauri-apps/tauri-action@v1:
#   - it runs the Tauri build consistently after we install Node/Rust deps
#   - caches Rust build artifacts across runs (~10x faster rebuilds)
#   - uses beforeBuildCommand from tauri.conf.json while this workflow keeps
#     target architectures and installer formats explicit
#
# Artifact retention: 14 days. GitHub Releases are permanent; daxia-branch
# artifacts remain intentionally short-lived.
# ═══════════════════════════════════════════════════════════

name: Release Build

on:
  push:
    branches: [daxia]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA). Defaults to daxia.'
        required: false
        default: 'daxia'

concurrency:
  group: release-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Check package.json, Cargo.toml, and tauri.conf.json
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(jq -r '.version' package.json)"
          cargo_version="$(awk -F\" '/^version[[:space:]]*=/ { print $2; exit }' src-tauri/Cargo.toml)"
          tauri_version="$(jq -r '.version' src-tauri/tauri.conf.json)"

          echo "package.json=$package_version"
          echo "Cargo.toml=$cargo_version"
          echo "tauri.conf.json=$tauri_version"

          if [ "$package_version" != "$cargo_version" ] || [ "$package_version" != "$tauri_version" ]; then
            echo "::error::Version mismatch: package.json ($package_version), Cargo.toml ($cargo_version), and tauri.conf.json ($tauri_version) must match"
            exit 1
          fi

          release_ref="${{ github.event.inputs.ref || github.ref_name }}"
          if [[ "$release_ref" == v* ]]; then
            tag_version="${release_ref#v}"
            if [ "$tag_version" != "$package_version" ]; then
              echo "::error::Tag $release_ref does not match desktop version $package_version"
              exit 1
            fi
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: verify-version
    permissions:
      actions: read
      contents: read
    env:
      IS_TAG_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.ref, 'v') }}
    strategy:
      fail-fast: false              # keep all platforms building even if one fails
      matrix:
        include:
          # macOS — one package per architecture. Splitting the targets keeps
          # each download small while the updater selects the running arch.
          # Pin the image to avoid macos-latest migration drift.
          - name: macOS ARM64
            artifact_name: macos-arm64
            platform: macos-15
            target: 'aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
            macos_signing_identity: '-'
            # The updater consumes the signed .app.tar.gz artifact; DMG is
            # retained for manual installation.
            bundle_args: '--bundles app,dmg'
          - name: macOS x64
            artifact_name: macos-x86_64
            platform: macos-15-intel
            target: 'x86_64-apple-darwin'
            rust_targets: 'x86_64-apple-darwin'
            macos_signing_identity: '-'
            bundle_args: '--bundles app,dmg'
          # Windows — native MSVC runners for both supported architectures.
          - name: Windows x64
            artifact_name: windows-x86_64
            platform: windows-latest
            target: 'x86_64-pc-windows-msvc'
            rust_targets: 'x86_64-pc-windows-msvc'
            macos_signing_identity: ''
            bundle_args: '--bundles nsis,msi'
          - name: Windows ARM64
            artifact_name: windows-arm64
            platform: windows-11-arm
            target: 'aarch64-pc-windows-msvc'
            rust_targets: 'aarch64-pc-windows-msvc'
            macos_signing_identity: ''
            bundle_args: '--bundles nsis,msi'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS Tauri bundles
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || matrix.macos_signing_identity }}
        with:
          args: --target ${{ matrix.target }} ${{ matrix.bundle_args }}

      - name: Build Windows application
        if: runner.os == 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }} --no-bundle --ci

      - name: Resolve SignPath release configuration
        if: runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true'
        id: signpath-config
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_APPLICATION_ARTIFACT_CONFIGURATION_SLUG: ${{ secrets.SIGNPATH_APPLICATION_ARTIFACT_CONFIGURATION_SLUG }}
          SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG: ${{ secrets.SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG }}
        run: |
          $required = @(
            'SIGNPATH_API_TOKEN',
            'SIGNPATH_ORGANIZATION_ID',
            'SIGNPATH_PROJECT_SLUG',
            'SIGNPATH_SIGNING_POLICY_SLUG',
            'SIGNPATH_APPLICATION_ARTIFACT_CONFIGURATION_SLUG',
            'SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG'
          )
          $missing = $required | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) }
          if ($missing.Count -gt 0) {
            Write-Warning "SignPath Foundation is not configured; publishing unsigned Windows installers. Missing: $($missing -join ', ')"
            "enabled=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          "enabled=true" >> $env:GITHUB_OUTPUT

      - name: Upload unsigned Windows application for SignPath
        if: runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        id: upload-unsigned-windows-application
        uses: actions/upload-artifact@v7
        with:
          name: signpath-unsigned-app-${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/junqi-desktop.exe
          retention-days: 1
          if-no-files-found: error

      - name: Sign Windows application with SignPath Foundation
        if: runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_APPLICATION_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-windows-application.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ runner.temp }}/signpath-signed-app

      - name: Activate signed Windows application
        if: runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signed = Get-ChildItem "$env:RUNNER_TEMP/signpath-signed-app" -Recurse -Filter junqi-desktop.exe | Select-Object -First 1
          if (-not $signed) { throw 'SignPath did not return junqi-desktop.exe.' }
          Copy-Item $signed.FullName "src-tauri/target/${{ matrix.target }}/release/junqi-desktop.exe" -Force

      - name: Bundle Windows installers
        if: runner.os == 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri bundle --target ${{ matrix.target }} --bundles nsis,msi --ci

      - name: Upload unsigned Windows installers for SignPath
        if: runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        id: upload-unsigned-windows-installers
        uses: actions/upload-artifact@v7
        with:
          name: signpath-unsigned-installers-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          retention-days: 1
          if-no-files-found: error

      - name: Sign Windows installers with SignPath Foundation
        if: runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-windows-installers.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ runner.temp }}/signpath-signed-installers

      - name: Re-sign Windows updater artifacts after Authenticode
        if: runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $installers = Get-ChildItem "$env:RUNNER_TEMP/signpath-signed-installers" -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' }
          if ($installers.Count -lt 2) { throw "Expected at least two signed Windows installers, found $($installers.Count)." }
          foreach ($installer in $installers) {
            pnpm tauri signer sign $installer.FullName
            if ($LASTEXITCODE -ne 0) { throw "Tauri updater signing failed for $($installer.FullName)." }
          }

      - name: Verify macOS disk image and app signature
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmgs=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [[ ${#dmgs[@]} -ne 1 ]]; then
            echo "Expected exactly one DMG, found ${#dmgs[@]}" >&2
            exit 1
          fi

          mount_point="$RUNNER_TEMP/junqi-dmg-verify"
          mkdir -p "$mount_point"
          hdiutil verify "${dmgs[0]}"
          hdiutil attach -nobrowse -readonly -mountpoint "$mount_point" "${dmgs[0]}"
          trap 'hdiutil detach "$mount_point"' EXIT

          apps=("$mount_point"/*.app)
          if [[ ${#apps[@]} -ne 1 ]]; then
            echo "Expected exactly one app bundle, found ${#apps[@]}" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${apps[0]}"

      - name: Verify Windows Authenticode signatures
        if: runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem "$env:RUNNER_TEMP/signpath-signed-installers" -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $artifacts) { throw 'No Windows installers were produced.' }
          foreach ($artifact in $artifacts) {
            $signature = Get-AuthenticodeSignature $artifact.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Invalid Authenticode signature for $($artifact.FullName): $($signature.Status)"
            }
            Write-Host "Verified $($artifact.FullName) [$($signature.SignerCertificate.Subject)]"
          }

      - name: List built artifacts
        if: always()
        shell: bash
        run: |
          echo "Built artifacts:"
          find "src-tauri/target" -path "*/release/bundle/*" \( -name "*.dmg" -o -name "*.app" -o -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null | sort

      - name: Upload macOS DMG installer
        if: success() && runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.artifact_name }}-dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 14
          if-no-files-found: error

      - name: Upload macOS updater
        if: success() && runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.artifact_name }}-updater
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          retention-days: 14
          if-no-files-found: error

      - name: Upload signed Windows NSIS installer
        if: success() && runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.artifact_name }}-nsis
          path: |
            ${{ runner.temp }}/signpath-signed-installers/**/*-setup.exe
            ${{ runner.temp }}/signpath-signed-installers/**/*-setup.exe.sig
          retention-days: 14
          if-no-files-found: error

      - name: Upload signed Windows English MSI installer
        if: success() && runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.artifact_name }}-msi-en-us
          path: |
            ${{ runner.temp }}/signpath-signed-installers/**/*_en-US.msi
            ${{ runner.temp }}/signpath-signed-installers/**/*_en-US.msi.sig
          retention-days: 14
          if-no-files-found: error

      - name: Upload signed Windows Chinese MSI installer
        if: success() && runner.os == 'Windows' && env.IS_TAG_RELEASE == 'true' && steps.signpath-config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.artifact_name }}-msi-zh-cn
          path: |
            ${{ runner.temp }}/signpath-signed-installers/**/*_zh-CN.msi
            ${{ runner.temp }}/signpath-signed-installers/**/*_zh-CN.msi.sig
          retention-days: 14
          if-no-files-found: error

      - name: Upload unsigned Windows NSIS installer
        if: success() && runner.os == 'Windows' && (env.IS_TAG_RELEASE != 'true' || steps.signpath-config.outputs.enabled != 'true')
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.artifact_name }}-nsis
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe.sig
          retention-days: 14
          if-no-files-found: error

      - name: Upload unsigned Windows English MSI installer
        if: success() && runner.os == 'Windows' && (env.IS_TAG_RELEASE != 'true' || steps.signpath-config.outputs.enabled != 'true')
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.artifact_name }}-msi-en-us
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*_en-US.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*_en-US.msi.sig
          retention-days: 14
          if-no-files-found: error

      - name: Upload unsigned Windows Chinese MSI installer
        if: success() && runner.os == 'Windows' && (env.IS_TAG_RELEASE != 'true' || steps.signpath-config.outputs.enabled != 'true')
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.artifact_name }}-msi-zh-cn
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*_zh-CN.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*_zh-CN.msi.sig
          retention-days: 14
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    # Daxia branch builds remain Actions artifacts. A v* tag is the explicit signal
    # that a tested build should be public and permanent.
    if: needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.ref, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.ref || github.ref_name }}
      SIGNPATH_CONFIGURED: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' && secrets.SIGNPATH_PROJECT_SLUG != '' && secrets.SIGNPATH_SIGNING_POLICY_SLUG != '' && secrets.SIGNPATH_APPLICATION_ARTIFACT_CONFIGURATION_SLUG != '' && secrets.SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG != '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Verify tag matches the desktop version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"
          if [ "$version" != "$tag_version" ]; then
            echo "::error::Tag $RELEASE_TAG does not match package version $version"
            exit 1
          fi

      - name: Download installers
        uses: actions/download-artifact@v7
        with:
          pattern: junqi-desktop-*
          path: release-assets

      - name: Normalize macOS updater artifact names
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"

          normalize_updater() {
            local artifact_name="$1"
            local architecture="$2"
            local source_dir="release-assets/$artifact_name"
            local source="$source_dir/JunQi Desktop.app.tar.gz"
            local target="release-assets/JunQi Desktop_${version}_${architecture}.app.tar.gz"

            if [[ ! -f "$source" || ! -f "$source.sig" ]]; then
              echo "::error::Missing macOS updater or signature in $source_dir"
              exit 1
            fi

            mv "$source" "$target"
            mv "$source.sig" "$target.sig"
          }

          normalize_updater 'junqi-desktop-macos-arm64-updater' 'aarch64'
          normalize_updater 'junqi-desktop-macos-x86_64-updater' 'x64'

      - name: Generate updater manifest from final release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          node scripts/generate-updater-manifest.mjs \
            --assets-dir release-assets \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$RELEASE_TAG" \
            --version "$version" \
            --notes "JunQi Desktop $version" \
            --output release-assets/latest.json

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          assets=()
          while IFS= read -r -d '' asset; do
            assets+=("$asset")
          done < <(find release-assets -type f -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No installer assets were downloaded"
            exit 1
          fi

          tag="$RELEASE_TAG"
          title="JunQi Desktop ${tag#v}"
          if [ "$SIGNPATH_CONFIGURED" = "true" ]; then
            notes="Windows 安装器已通过 SignPath Foundation 完成 Authenticode 可信代码签名。"
          else
            notes="Windows 安装器暂未配置 Authenticode 可信代码签名，Windows 可能显示 SmartScreen 提示。附件中的 .sig 用于应用更新完整性验证，不等同于 Windows 系统信任证书。"
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$tag" --target daxia --notes "$notes" --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target daxia \
              --title "$title" \
              --notes "$notes"
          fi

  release:
    name: ✅ Release Summary
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report per-platform status
        run: |
          echo "## JunQi Desktop — Release Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build matrix | Targets | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Desktop installers | macOS ARM64/x64, Windows x64/ARM64 | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more platform builds failed"
            exit 1
          fi
          echo "✅ All platforms built successfully" >> "$GITHUB_STEP_SUMMARY"
