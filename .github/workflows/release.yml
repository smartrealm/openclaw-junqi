# ═══════════════════════════════════════════════════════════
# JunQi Desktop — Release Build (macOS + Windows + Linux)
#
# Builds the Tauri desktop app on macOS, Windows, and Linux in parallel and
# uploads installers as workflow artifacts. A version tag additionally
# creates a public GitHub Release with those installers attached. Designed
# to be triggered by either:
#   - push to main (fresh, short-lived binaries in the Actions tab)
#   - workflow_dispatch (manual ad-hoc builds)
#   - tag push v* (a permanent GitHub Release)
#
# Why all desktop platforms in one workflow rather than separate files:
#   - one place to read the matrix, cache strategy, artifact naming
#   - the '✅ Release Summary' job at the end gives a single status
#     banner for the whole release in the Actions tab
#
# Why use tauri-apps/tauri-action@v1:
#   - it runs the Tauri build consistently after we install Node/Rust deps
#   - caches Rust build artifacts across runs (~10x faster rebuilds)
#   - uses beforeBuildCommand from tauri.conf.json while this workflow keeps
#     target architectures and installer formats explicit
#
# Artifact retention: 14 days. GitHub Releases are permanent; main-branch
# artifacts remain intentionally short-lived.
# ═══════════════════════════════════════════════════════════

name: Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA). Defaults to main.'
        required: false
        default: 'main'

concurrency:
  group: release-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Check package.json, Cargo.toml, and tauri.conf.json
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(jq -r '.version' package.json)"
          cargo_version="$(awk -F\" '/^version[[:space:]]*=/ { print $2; exit }' src-tauri/Cargo.toml)"
          tauri_version="$(jq -r '.version' src-tauri/tauri.conf.json)"

          echo "package.json=$package_version"
          echo "Cargo.toml=$cargo_version"
          echo "tauri.conf.json=$tauri_version"

          if [ "$package_version" != "$cargo_version" ] || [ "$package_version" != "$tauri_version" ]; then
            echo "::error::Version mismatch: package.json ($package_version), Cargo.toml ($cargo_version), and tauri.conf.json ($tauri_version) must match"
            exit 1
          fi

          release_ref="${{ github.event.inputs.ref || github.ref_name }}"
          if [[ "$release_ref" == v* ]]; then
            tag_version="${release_ref#v}"
            if [ "$tag_version" != "$package_version" ]; then
              echo "::error::Tag $release_ref does not match desktop version $package_version"
              exit 1
            fi
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: verify-version
    permissions:
      contents: read
    strategy:
      fail-fast: false              # keep all platforms building even if one fails
      matrix:
        include:
          # macOS — universal (both arm64 and x86_64 in one .app/.dmg).
          # Pin the image to avoid macos-latest migration drift.
          - name: macOS universal
            artifact_name: macos-universal
            platform: macos-15
            target: 'universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            macos_signing_identity: '-'
            bundle_args: '--bundles dmg'
            installer_paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          # Windows — native MSVC runners for both supported architectures.
          - name: Windows x64
            artifact_name: windows-x86_64
            platform: windows-latest
            target: 'x86_64-pc-windows-msvc'
            rust_targets: 'x86_64-pc-windows-msvc'
            macos_signing_identity: ''
            bundle_args: '--bundles nsis,msi'
            installer_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          - name: Windows ARM64
            artifact_name: windows-arm64
            platform: windows-11-arm
            target: 'aarch64-pc-windows-msvc'
            rust_targets: 'aarch64-pc-windows-msvc'
            macos_signing_identity: ''
            bundle_args: '--bundles nsis,msi'
            installer_paths: |
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
          # Linux — native x64 packages for Debian-based systems and a
          # portable AppImage for other mainstream distributions.
          - name: Linux x64
            artifact_name: linux-x86_64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            macos_signing_identity: ''
            bundle_args: '--bundles appimage,deb'
            installer_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libasound2-dev \
            libfuse2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Prefer a configured Developer ID; keep certificate-free builds
          # internally valid by sealing the complete app with an ad-hoc identity.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || matrix.macos_signing_identity }}
        with:
          args: --target ${{ matrix.target }} ${{ matrix.bundle_args }}

      - name: Verify macOS disk image and app signature
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmgs=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [[ ${#dmgs[@]} -ne 1 ]]; then
            echo "Expected exactly one DMG, found ${#dmgs[@]}" >&2
            exit 1
          fi

          mount_point="$RUNNER_TEMP/junqi-dmg-verify"
          mkdir -p "$mount_point"
          hdiutil verify "${dmgs[0]}"
          hdiutil attach -nobrowse -readonly -mountpoint "$mount_point" "${dmgs[0]}"
          trap 'hdiutil detach "$mount_point"' EXIT

          apps=("$mount_point"/*.app)
          if [[ ${#apps[@]} -ne 1 ]]; then
            echo "Expected exactly one app bundle, found ${#apps[@]}" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${apps[0]}"

      - name: List built artifacts
        if: always()
        shell: bash
        run: |
          echo "Built artifacts:"
          find "src-tauri/target" -path "*/release/bundle/*" \( -name "*.dmg" -o -name "*.app" -o -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null | sort

      - name: Upload installer artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.artifact_name }}
          path: ${{ matrix.installer_paths }}
          retention-days: 14
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    # Main builds remain Actions artifacts. A v* tag is the explicit signal
    # that a tested build should be public and permanent.
    if: needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.ref, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Verify tag matches the desktop version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"
          if [ "$version" != "$tag_version" ]; then
            echo "::error::Tag $RELEASE_TAG does not match package version $version"
            exit 1
          fi

      - name: Download installers
        uses: actions/download-artifact@v7
        with:
          pattern: junqi-desktop-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          assets=()
          while IFS= read -r -d '' asset; do
            assets+=("$asset")
          done < <(find release-assets -type f -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No installer assets were downloaded"
            exit 1
          fi

          tag="$RELEASE_TAG"
          title="JunQi Desktop ${tag#v}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --generate-notes
          fi

  release:
    name: ✅ Release Summary
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report per-platform status
        run: |
          echo "## JunQi Desktop — Release Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build matrix | Targets | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Desktop installers | macOS universal, Windows x64, Windows ARM64, Linux x64 (AppImage, deb) | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more platform builds failed"
            exit 1
          fi
          echo "✅ All platforms built successfully" >> "$GITHUB_STEP_SUMMARY"
