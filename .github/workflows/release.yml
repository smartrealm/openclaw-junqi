# ═══════════════════════════════════════════════════════════
# JunQi Desktop — Release Build (macOS + Windows)
#
# Builds the Tauri desktop app on macOS and Windows in parallel and
# uploads installers as workflow artifacts. A version tag additionally
# creates a public GitHub Release with those installers attached. Designed
# to be triggered by either:
#   - push to main (fresh, short-lived binaries in the Actions tab)
#   - workflow_dispatch (manual ad-hoc builds)
#   - tag push v* (a permanent GitHub Release)
#
# Why both platforms in one workflow rather than two separate files:
#   - one place to read the matrix, cache strategy, artifact naming
#   - the '✅ Release Summary' job at the end gives a single status
#     banner for the whole release in the Actions tab
#
# Why use tauri-apps/tauri-action@v1:
#   - it runs the Tauri build consistently after we install Node/Rust deps
#   - caches Rust build artifacts across runs (~10x faster rebuilds)
#   - uses the beforeBuildCommand/bundleConfig from tauri.conf.json
#     so this file stays in sync with the app's own configuration
#
# Artifact retention: 14 days. GitHub Releases are permanent; main-branch
# artifacts remain intentionally short-lived.
# ═══════════════════════════════════════════════════════════

name: Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA). Defaults to main.'
        required: false
        default: 'main'

concurrency:
  group: release-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.arch }})
    permissions:
      contents: read
    strategy:
      fail-fast: false              # keep all platforms building even if one fails
      matrix:
        include:
          # macOS — universal (both arm64 and x86_64 in one .app/.dmg).
          # Pin the image to avoid macos-latest migration drift.
          - platform: macos-15
            os: 'macos'
            arch: 'universal'
            target: 'universal-apple-darwin'
            installer_paths: |
              src-tauri/target/**/release/bundle/**/*.dmg
          # Windows — MSVC, single arch
          - platform: windows-latest
            os: 'windows'
            arch: 'x64'
            target: 'x86_64-pc-windows-msvc'
            installer_paths: |
              src-tauri/target/**/release/bundle/**/*.msi
              src-tauri/target/**/release/bundle/**/*-setup.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Tauri reads tauri.conf.json for everything else (productName,
          # bundle targets, icon, etc.). We only need to override
          # --target when building for a specific arch.
          args: ${{ matrix.target == 'universal-apple-darwin' && '--target universal-apple-darwin' || format('--target {0}', matrix.target) }}

      - name: List built artifacts
        if: always()
        shell: bash
        run: |
          echo "Built artifacts:"
          find "src-tauri/target" -path "*/release/bundle/*" \( -name "*.dmg" -o -name "*.app" -o -name "*.msi" -o -name "*.exe" \) 2>/dev/null | sort

      - name: Upload installer artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: junqi-desktop-${{ matrix.os }}-${{ matrix.target }}
          path: ${{ matrix.installer_paths }}
          retention-days: 14
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    # Main builds remain Actions artifacts. A v* tag is the explicit signal
    # that a tested build should be public and permanent.
    if: needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches the desktop version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $version"
            exit 1
          fi

      - name: Download installers
        uses: actions/download-artifact@v7
        with:
          pattern: junqi-desktop-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          assets=()
          while IFS= read -r -d '' asset; do
            assets+=("$asset")
          done < <(find release-assets -type f -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No installer assets were downloaded"
            exit 1
          fi

          tag="$GITHUB_REF_NAME"
          title="JunQi Desktop ${tag#v}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --generate-notes
          fi

  release:
    name: ✅ Release Summary
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report per-platform status
        run: |
          echo "## JunQi Desktop — Release Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for job in $(echo "${{ needs.build.result }}"); do :; done
          echo "| macOS (universal) | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          # The 'needs' array gives a single result string; for per-platform
          # detail, the Actions tab UI shows each matrix leg's status.

          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more platform builds failed"
            exit 1
          fi
          echo "✅ All platforms built successfully" >> "$GITHUB_STEP_SUMMARY"
